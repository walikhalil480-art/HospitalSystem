version: "3.9"

services:
  db:
    image: postgres:15.6
    container_name: hospital_db
    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - hospital_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    image: hospital-backend:1.0.0
    container_name: hospital_backend
    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy

    expose:
      - "5000"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    networks:
      - hospital_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    image: hospital-frontend:1.0.0
    container_name: hospital_frontend
    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "80:80"

    networks:
      - hospital_network

volumes:
  postgres_data:

networks:
  hospital_network:
    driver: bridge
